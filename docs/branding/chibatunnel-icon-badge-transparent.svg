<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="mg" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cg" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="9"   result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vp"  x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="vpc" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="6"/></filter>
    <radialGradient id="bgr" cx="50%" cy="45%" r="70%">
      <stop offset="0%"   stop-color="#110020"/>
      <stop offset="55%"  stop-color="#0d0019"/>
      <stop offset="100%" stop-color="#060010"/>
    </radialGradient>
    <clipPath id="rnd"><rect width="512" height="512" rx="90"/></clipPath>
  </defs>
  <!-- ── TUNNEL GRID ── -->
  <g filter="url(#cg)">
    <line x1="172" y1="184" x2="256" y2="318" stroke="#00ccff" stroke-width="1.8" opacity="0.92"/>
    <line x1="340" y1="184" x2="256" y2="318" stroke="#00ccff" stroke-width="1.8" opacity="0.92"/>
    <line x1="256" y1="184" x2="256" y2="318" stroke="#00ccff" stroke-width="0.9" opacity="0.30"/>
    <line x1="190.8" y1="214" x2="321.2" y2="214" stroke="#00ccff" stroke-width="1.60" opacity="0.90"/>
    <line x1="208.4" y1="242" x2="303.6" y2="242" stroke="#00ccff" stroke-width="1.37" opacity="0.78"/>
    <line x1="225.3" y1="269" x2="286.7" y2="269" stroke="#00ccff" stroke-width="1.14" opacity="0.66"/>
    <line x1="241.0" y1="294" x2="271.0" y2="294" stroke="#00ccff" stroke-width="0.91" opacity="0.54"/>
    <line x1="148" y1="436" x2="256" y2="318" stroke="#00ccff" stroke-width="1.2" opacity="0.52"/>
    <line x1="364" y1="436" x2="256" y2="318" stroke="#00ccff" stroke-width="1.2" opacity="0.52"/>
    <line x1="202.9" y1="376" x2="309.1" y2="376" stroke="#00ccff" stroke-width="1.00" opacity="0.42"/>
    <line x1="175.5" y1="406" x2="336.5" y2="406" stroke="#00ccff" stroke-width="0.85" opacity="0.29"/>
  </g>

  <!-- VP glow -->
  <circle cx="256" cy="318" r="36" fill="#00ccff" opacity="0.28" filter="url(#vp)"/>
  <circle cx="256" cy="318" r="12" fill="#00ccff" opacity="0.65" filter="url(#vpc)"/>
  <circle cx="256" cy="318" r="4"  fill="#ffffff"/>

  <!-- ── TORII ── -->
  <polygon points="72,122 90,80 110,76 402,76 422,80 440,122  440,136 422,96 402,92 110,92 90,96 72,136" fill="#ff0055" filter="url(#mg)"/>
  <rect    x="148" y="168" width="216" height="16" rx="3" fill="#ff0055" filter="url(#mg)"/>
  <rect x="148" y="184" width="24" height="252" rx="3" fill="#ff0055" filter="url(#mg)"/>
  <rect x="340" y="184" width="24" height="252" rx="3" fill="#ff0055" filter="url(#mg)"/>

  <!-- Circuit traces -->
  <g stroke="#00ccff" stroke-width="1.3" opacity="0.48" fill="none">
    <polyline points="148,250 108,250 108,282"/>
    <polyline points="148,322 100,322"/>
    <circle cx="108" cy="282" r="3.2" fill="#00ccff" stroke="none" opacity="0.75"/>
    <circle cx="100" cy="322" r="3.2" fill="#00ccff" stroke="none" opacity="0.75"/>
    <polyline points="364,266 404,266 404,294"/>
    <polyline points="364,336 412,336"/>
    <circle cx="404" cy="294" r="3.2" fill="#00ccff" stroke="none" opacity="0.75"/>
    <circle cx="412" cy="336" r="3.2" fill="#00ccff" stroke="none" opacity="0.75"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#ff0055" stroke-width="3" stroke-linecap="square" opacity="0.42">
    <line x1="30" y1="60" x2="30" y2="30"/><line x1="30" y1="30" x2="60" y2="30"/>
    <line x1="482" y1="60" x2="482" y2="30"/><line x1="482" y1="30" x2="452" y2="30"/>
    <line x1="30" y1="452" x2="30" y2="482"/><line x1="30" y1="482" x2="60" y2="482"/>
    <line x1="482" y1="452" x2="482" y2="482"/><line x1="482" y1="482" x2="452" y2="482"/>
  </g>

  <!-- Badge name (text inside icon canvas) -->
  <line x1="190" y1="443" x2="322" y2="443" stroke="#ff0055" stroke-width="0.8" opacity="0.28"/>
  <text x="256" y="465"
    font-family="'JetBrains Mono', 'Courier New', monospace" font-size="27" font-weight="700" letter-spacing="3"
    text-anchor="middle" fill="#ff0055" filter="url(#mg)">CHIBA</text>
  <text x="256" y="490"
    font-family="'JetBrains Mono', 'Courier New', monospace" font-size="17" font-weight="400" letter-spacing="9"
    text-anchor="middle" fill="#00ccff" filter="url(#cg)">TUNNEL</text>
</svg>