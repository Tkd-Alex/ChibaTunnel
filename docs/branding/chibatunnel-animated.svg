<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="mg" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cg" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="9"   result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vp"  x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="vpc" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="6"/></filter>
    <radialGradient id="bgr" cx="50%" cy="45%" r="70%">
      <stop offset="0%"   stop-color="#110020"/>
      <stop offset="55%"  stop-color="#0d0019"/>
      <stop offset="100%" stop-color="#060010"/>
    </radialGradient>
    <clipPath id="rnd"><rect width="512" height="512" rx="90"/></clipPath>
  </defs>
  <style>
    /* VP orb heartbeat */
    #vpc  { animation: vp-p 2.2s ease-in-out infinite; }
    #vpg  { animation: vp-g 2.2s ease-in-out infinite; }
    #vpd  { animation: vp-d 2.2s ease-in-out infinite; }
    @keyframes vp-p { 0%,100%{opacity:.65} 45%{opacity:1.0} }
    @keyframes vp-g { 0%,100%{opacity:.28} 45%{opacity:.65} }
    @keyframes vp-d { 0%,100%{r:4}          45%{r:6} }

    /* Data-packets travel along wall diagonals toward VP */
    #wl { stroke-dasharray:14 144; animation: dp 2.0s 0.0s linear infinite; }
    #wr { stroke-dasharray:14 144; animation: dp 2.0s 1.0s linear infinite; }
    @keyframes dp { to { stroke-dashoffset:-158; } }

    /* Tunnel zoom: depth lines rush from VP toward viewer */
    #dl4 { animation: dz 2.6s 0.00s ease-in-out infinite; }
    #dl3 { animation: dz 2.6s 0.25s ease-in-out infinite; }
    #dl2 { animation: dz 2.6s 0.50s ease-in-out infinite; }
    #dl1 { animation: dz 2.6s 0.75s ease-in-out infinite; }
    @keyframes dz {
      0%,100% { opacity:.06; stroke-width:.4; }
      22%     { opacity:.95; stroke-width:2.2; }
      60%     { opacity:.12; stroke-width:.5; }
    }

    /* Circuit dots blink offset */
    #td1,#td3 { animation: db 1.8s 0.0s ease-in-out infinite; }
    #td2,#td4 { animation: db 1.8s 0.9s ease-in-out infinite; }
    @keyframes db { 0%,100%{opacity:.75} 50%{opacity:.08} }

    /* Torii slow glow breathe */
    #kasagi,#nuki,#lpillar,#rpillar { animation: tb 4.0s ease-in-out infinite; }
    @keyframes tb { 0%,100%{opacity:.94} 50%{opacity:1.0} }

    /* Scanline scroll */
    #scanlayer { animation: ss 8s linear infinite; }
    @keyframes ss { from{transform:translateY(0)} to{transform:translateY(14px)} }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }
  </style>
  <rect width="512" height="512" fill="url(#bgr)" rx="90"/>
  <g id="scanlayer" clip-path="url(#rnd)" opacity="0.040">
    <line x1="0" y1="-14" x2="512" y2="-14" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="0" x2="512" y2="0" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="14" x2="512" y2="14" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="28" x2="512" y2="28" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="42" x2="512" y2="42" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="56" x2="512" y2="56" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="70" x2="512" y2="70" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="84" x2="512" y2="84" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="98" x2="512" y2="98" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="112" x2="512" y2="112" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="126" x2="512" y2="126" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="140" x2="512" y2="140" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="154" x2="512" y2="154" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="168" x2="512" y2="168" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="182" x2="512" y2="182" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="196" x2="512" y2="196" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="210" x2="512" y2="210" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="224" x2="512" y2="224" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="238" x2="512" y2="238" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="252" x2="512" y2="252" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="266" x2="512" y2="266" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="280" x2="512" y2="280" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="294" x2="512" y2="294" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="308" x2="512" y2="308" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="322" x2="512" y2="322" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="336" x2="512" y2="336" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="350" x2="512" y2="350" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="364" x2="512" y2="364" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="378" x2="512" y2="378" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="392" x2="512" y2="392" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="406" x2="512" y2="406" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="420" x2="512" y2="420" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="434" x2="512" y2="434" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="448" x2="512" y2="448" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="462" x2="512" y2="462" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="476" x2="512" y2="476" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="490" x2="512" y2="490" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="504" x2="512" y2="504" stroke="#ff0055" stroke-width="0.7"/>
    <line x1="0" y1="518" x2="512" y2="518" stroke="#ff0055" stroke-width="0.7"/>
  </g>
  <!-- ── TUNNEL GRID ── -->
  <g filter="url(#cg)">
    <line id="wl" x1="172" y1="184" x2="256" y2="318" stroke="#00ccff" stroke-width="1.8" opacity="0.92"/>
    <line id="wr" x1="340" y1="184" x2="256" y2="318" stroke="#00ccff" stroke-width="1.8" opacity="0.92"/>
    <line x1="256" y1="184" x2="256" y2="318" stroke="#00ccff" stroke-width="0.9" opacity="0.30"/>
    <line id="dl1" x1="190.8" y1="214" x2="321.2" y2="214" stroke="#00ccff" stroke-width="1.60" opacity="0.90"/>
    <line id="dl2" x1="208.4" y1="242" x2="303.6" y2="242" stroke="#00ccff" stroke-width="1.37" opacity="0.78"/>
    <line id="dl3" x1="225.3" y1="269" x2="286.7" y2="269" stroke="#00ccff" stroke-width="1.14" opacity="0.66"/>
    <line id="dl4" x1="241.0" y1="294" x2="271.0" y2="294" stroke="#00ccff" stroke-width="0.91" opacity="0.54"/>
    <line id="fl" x1="148" y1="436" x2="256" y2="318" stroke="#00ccff" stroke-width="1.2" opacity="0.52"/>
    <line id="fr" x1="364" y1="436" x2="256" y2="318" stroke="#00ccff" stroke-width="1.2" opacity="0.52"/>
    <line x1="202.9" y1="376" x2="309.1" y2="376" stroke="#00ccff" stroke-width="1.00" opacity="0.42"/>
    <line x1="175.5" y1="406" x2="336.5" y2="406" stroke="#00ccff" stroke-width="0.85" opacity="0.29"/>
  </g>

  <!-- VP glow -->
  <circle id="vpg" cx="256" cy="318" r="36" fill="#00ccff" opacity="0.28" filter="url(#vp)"/>
  <circle id="vpc" cx="256" cy="318" r="12" fill="#00ccff" opacity="0.65" filter="url(#vpc)"/>
  <circle id="vpd" cx="256" cy="318" r="4"  fill="#ffffff"/>

  <!-- ── TORII ── -->
  <polygon id="kasagi" points="72,122 90,80 110,76 402,76 422,80 440,122  440,136 422,96 402,92 110,92 90,96 72,136" fill="#ff0055" filter="url(#mg)"/>
  <rect id="nuki"    x="148" y="168" width="216" height="16" rx="3" fill="#ff0055" filter="url(#mg)"/>
  <rect id="lpillar" x="148" y="184" width="24" height="252" rx="3" fill="#ff0055" filter="url(#mg)"/>
  <rect id="rpillar" x="340" y="184" width="24" height="252" rx="3" fill="#ff0055" filter="url(#mg)"/>

  <!-- Circuit traces -->
  <g stroke="#00ccff" stroke-width="1.3" opacity="0.48" fill="none">
    <polyline points="148,250 108,250 108,282"/>
    <polyline points="148,322 100,322"/>
    <circle id="td1" cx="108" cy="282" r="3.2" fill="#00ccff" stroke="none" opacity="0.75"/>
    <circle id="td2" cx="100" cy="322" r="3.2" fill="#00ccff" stroke="none" opacity="0.75"/>
    <polyline points="364,266 404,266 404,294"/>
    <polyline points="364,336 412,336"/>
    <circle id="td3" cx="404" cy="294" r="3.2" fill="#00ccff" stroke="none" opacity="0.75"/>
    <circle id="td4" cx="412" cy="336" r="3.2" fill="#00ccff" stroke="none" opacity="0.75"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#ff0055" stroke-width="3" stroke-linecap="square" opacity="0.42">
    <line x1="30" y1="60" x2="30" y2="30"/><line x1="30" y1="30" x2="60" y2="30"/>
    <line x1="482" y1="60" x2="482" y2="30"/><line x1="482" y1="30" x2="452" y2="30"/>
    <line x1="30" y1="452" x2="30" y2="482"/><line x1="30" y1="482" x2="60" y2="482"/>
    <line x1="482" y1="452" x2="482" y2="482"/><line x1="482" y1="482" x2="452" y2="482"/>
  </g>
</svg>